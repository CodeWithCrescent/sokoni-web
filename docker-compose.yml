services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sokoni_web
    restart: unless-stopped
    ports:
      - "8800:80"
    volumes:
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    networks:
      - sambilanet

networks:
  sambilanet:
    external: true
